apiVersion: v1
kind: Namespace
metadata:
  name: apps

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: apps

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-role
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - namespaces
      - services
    verbs: ["get","list","watch"]

  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get","list","watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage-role
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: apps

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-settings
  namespace: apps
data:
  settings.yaml: |
    title: Yggdrasil Command Center
    theme: dark
    headerStyle: boxed

    layout:
      Infrastructure:
        style: row
        columns: 4

      Observability:
        style: row
        columns: 4

      Media:
        style: row
        columns: 5

      Internet:
        style: row
        columns: 5

      Utilities:
        style: row
        columns: 3

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-widgets
  namespace: apps
data:
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: Yggdrasil Cluster

        nodes:
          show: true
          cpu: true
          memory: true

        pods:
          show: true

    - datetime:
        text_size: xl
        format:
          dateStyle: full
          timeStyle: long

    - search:
        provider: duckduckgo
        target: _blank

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-services
  namespace: apps
data:
  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            href: https://argocd.shasame.fr
            description: GitOps Engine
            icon: argocd.png
            ping: https://argocd.shasame.fr

        - Longhorn:
            href: https://longhorn.shasame.fr
            description: Distributed Storage
            icon: longhorn.png

        - AdGuard:
            href: https://adguard.shasame.fr
            description: Network Ad Blocking
            icon: adguard-home.png

        - LLDAP:
            href: https://lldap.shasame.fr
            description: Directory Service
            icon: ldap.png

    - Observability:
        - Grafana:
            href: https://grafana.shasame.fr
            icon: grafana.png

        - Prometheus:
            href: https://prometheus.shasame.fr
            icon: prometheus.png

    - Media:
        - Twitch:
            href: https://twitch.tv
            icon: twitch.png

        - YouTube:
            href: https://youtube.com
            icon: youtube.png

    - Internet:
        - GitHub:
            href: https://github.com
            icon: github.png

        - Reddit:
            href: https://reddit.com
            icon: reddit.png

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage

      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest

          ports:
            - containerPort: 3000

          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: home.shasame.fr

          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 256Mi

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          volumeMounts:
            - name: settings
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml

            - name: widgets
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml

            - name: services
              mountPath: /app/config/services.yaml
              subPath: services.yaml

      volumes:
        - name: settings
          configMap:
            name: homepage-settings

        - name: widgets
          configMap:
            name: homepage-widgets

        - name: services
          configMap:
            name: homepage-services

---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: apps
spec:
  selector:
    app: homepage
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: apps
spec:
  entryPoints:
    - websecure

  routes:
    - match: Host(`home.shasame.fr`)
      kind: Rule
      services:
        - name: homepage
          port: 3000
      middlewares:
        - name: auth-forward
          namespace: auth

  tls:
    certResolver: default