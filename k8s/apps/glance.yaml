# 1. The Configuration (Your Feeds and Links)
apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: apps
data:
  glance.yml: |
    layout:
      columns: 3
      column_sizes:
        - small
        - large
        - small

    theme:
      background-color: 222 47% 11%
      primary-color: 217 91% 60%

    pages:
      - name: Home
        columns:
          - size: small
            widgets:
              - type: bookmarks
                title: Homelab
                links:
                  - title: Infra Dashboard
                    url: https://home.shasame.fr
                    icon: server
              - type: clock
                title: "Local Time"
                format: "HH:mm:ss"
                timezone: "auto"
              - type: calendar
                title: "Calendar"
                view: "month"
                first_day_of_week: monday
              - type: weather
                title: "Weather"
                location: "Paris, FR"
                units: "metric"
                refresh_interval: 10m
          - size: large
            widgets:
              - type: rss
                title: "Tech News"
                feed_url: "https://www.reddit.com/r/technology/.rss"
                max_items: 5
              - type: rss
                title: "DevOps News"
                feed_url: "https://www.reddit.com/r/devops/.rss"
                max_items: 5
          - size: small
            widgets:
              - type: twitch-channels
                channels:
                  - Alderiate
                  - TraYtoNlol
              - type: bookmarks
                title: Music
                links:
                  - name: Late-Night Vibes
                    url: https://www.youtube.com/watch?v=kQ1A85aIzFU&list=RDkQ1A85aIzFU&start_radio=1
---
# 2. The Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glance
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glance
  template:
    metadata:
      labels:
        app: glance
    spec:
      containers:
        - name: glance
          image: glanceapp/glance:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /app/config/glance.yml
              subPath: glance.yml
          resources:
            requests:
              memory: "50Mi"
              cpu: "50m"
            limits:
              memory: "150Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: glance-config

---
# 3. Service
apiVersion: v1
kind: Service
metadata:
  name: glance
  namespace: apps
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: glance

---
# 4. Traefik IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: glance
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`glance.shasame.fr`)
      kind: Rule
      services:
        - name: glance
          port: 8080
      middlewares:
        - name: auth-forward
          namespace: auth
  tls:
    certResolver: default
