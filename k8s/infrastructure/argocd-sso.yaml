apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: https://argocd.shasame.fr
  oidc.config: |
    name: Yggdrasil SSO
    issuer: https://auth.shasame.fr
    clientID: argocd
    clientSecret: $oidc.dex.clientSecret 
    requestedScopes: ["openid", "profile", "email", "groups"]