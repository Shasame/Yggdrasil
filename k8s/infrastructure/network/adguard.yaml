apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguard-home
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://adguardteam.github.io/adguard-home-helm-chart'
    chart: adguard-home
    targetRevision: '2.4.2' # Stable chart version
    helm:
      values: |
        service:
          type: LoadBalancer
          loadBalancerIP: 192.168.1.240
          ports:
            dns-udp:
              port: 53
              targetPort: 53
              protocol: UDP
            dns-tcp:
              port: 53
              targetPort: 53
              protocol: TCP
            http:
              port: 80
              targetPort: 3000
        persistence:
          enabled: true
          storageClass: "longhorn"
          size: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: network
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adguard-ui
  namespace: network
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`adguard.shasame.fr`)
      kind: Rule
      services:
        - name: adguard-home
          port: 80
      middlewares:
        - name: auth-forward
          namespace: auth
  tls:
    certResolver: default