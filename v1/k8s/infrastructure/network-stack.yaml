apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/Shasame/Yggdrasil.git'
    targetRevision: HEAD
    path: v1/k8s/infrastructure/network
  destination:
    server: https://kubernetes.default.svc
    namespace: network
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true